project:
  name: Data Science for Thailand Election 2026
  province: ชัยภูมิ
  constituency_no: 2
  expected_polling_stations: 341
  ect_source_url: https://www.ect.go.th/ect_th/th/election-2026

paths:
  manifest: configs/chaiyaphum_2_manifest.csv
  raw_pdf_dir: data/raw/pdfs
  raw_image_dir: data/raw/images
  raw_ocr_dir: data/raw/ocr
  parsed_dir: data/processed/parsed
  processed_dir: data/processed
  external_dir: data/external
  figures_dir: outputs/figures
  reports_dir: outputs/reports
  correction_file: data/external/manual_corrections.csv

ocr:
  primary_engine: paddleocr
  fallback_engine: easyocr
  languages:
    - th
    - en
  dpi: 120
  image_format: png
  confidence_threshold: 0.65
  fallback_confidence_threshold: 0.45
  paddle:
    text_detection_model_name: PP-OCRv5_mobile_det
    text_recognition_model_name: th_PP-OCRv5_mobile_rec
    use_doc_orientation_classify: false
    use_doc_unwarping: false
    use_textline_orientation: false
    text_det_limit_side_len: 640

outputs:
  election_results: data/processed/election_results_long.csv
  polling_station_summary: data/processed/polling_station_summary.csv
  validation_report: data/processed/validation_report.csv
  ocr_progress: data/processed/ocr_progress.csv
  validation_report_md: outputs/reports/validation_report.md
  dashboard_dataset: data/processed/dashboard_dataset.parquet
  dashboard_dataset_csv: data/processed/dashboard_dataset.csv
  constituency_votes: data/processed/constituency_votes.csv
  partylist_votes: data/processed/partylist_votes.csv
  insights_report: outputs/reports/insights_report.md
