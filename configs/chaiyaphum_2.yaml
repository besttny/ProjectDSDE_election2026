project:
  name: Data Science for Thailand Election 2026
  province: ชัยภูมิ
  constituency_no: 2
  expected_polling_stations: 341
  ect_source_url: https://www.ect.go.th/ect_th/th/election-2026

paths:
  manifest: configs/chaiyaphum_2_manifest.csv
  raw_pdf_dir: data/raw/pdfs
  raw_image_dir: data/raw/images
  raw_ocr_dir: data/raw/ocr
  parsed_dir: data/processed/parsed
  processed_dir: data/processed
  external_dir: data/external
  figures_dir: outputs/figures
  reports_dir: outputs/reports
  correction_file: data/external/manual_corrections.csv
  reviewed_rows_file: data/external/reviewed_rows.csv
  reviewed_vote_cells_file: data/external/reviewed_vote_cells.csv
  ground_truth_file: data/external/ground_truth_sample.csv
  aggregate_validation_reference_file: data/external/aggregate_validation_reference.csv
  master_parties_file: data/external/master_parties.csv
  master_candidates_file: data/external/master_candidates.csv
  master_stations_file: data/external/master_polling_stations.csv

ocr:
  primary_engine: paddleocr
  fallback_engine: ""
  languages:
    - th
  dpi: 350
  image_format: png
  confidence_threshold: 0.65
  fallback_confidence_threshold: 0.45
  zone_ocr:
    enabled: true
    zones:
      - metadata
      - summary
      - table
  paddle:
    device: gpu:0
    enable_hpi: false
    use_tensorrt: false
    precision: fp32
    text_detection_model_name: PP-OCRv5_mobile_det
    text_recognition_model_name: th_PP-OCRv5_mobile_rec
    use_doc_orientation_classify: false
    use_doc_unwarping: false
    use_textline_orientation: false
    text_det_limit_side_len: 2240
  preprocessing:
    enabled: true
    profiles:
      thai_text:
        mode: thai_text
        grayscale: true
        autocontrast: true
        sharpen: true
        sharpen_percent: 140
        upscale: 1.25
      table_text:
        mode: table_text
        grayscale: true
        autocontrast: true
        line_removal:
          enabled: true
          horizontal: true
          vertical: true
          threshold: 175
          thickness: 1
          horizontal_min_run_ratio: 0.45
          vertical_min_run_ratio: 0.55
        sharpen: true
        sharpen_percent: 180
        upscale: 1.5
      advance_constituency_table_text:
        mode: advance_constituency_table_text
        grayscale: true
        autocontrast: true
        line_removal:
          enabled: true
          horizontal: true
          vertical: true
          threshold: 175
          thickness: 1
          horizontal_min_run_ratio: 0.45
          vertical_min_run_ratio: 0.55
        sharpen: true
        sharpen_percent: 170
        upscale: 1.45
      advance_partylist_table_text:
        mode: advance_partylist_table_text
        grayscale: true
        autocontrast: true
        line_removal:
          enabled: true
          horizontal: true
          vertical: true
          threshold: 175
          thickness: 1
          horizontal_min_run_ratio: 0.45
          vertical_min_run_ratio: 0.52
        sharpen: true
        sharpen_percent: 190
        upscale: 1.6
      election_day_constituency_table_text:
        mode: election_day_constituency_table_text
        grayscale: true
        autocontrast: true
        line_removal:
          enabled: true
          horizontal: true
          vertical: true
          threshold: 175
          thickness: 1
          horizontal_min_run_ratio: 0.45
          vertical_min_run_ratio: 0.55
        sharpen: true
        sharpen_percent: 185
        upscale: 1.5
      election_day_partylist_table_text:
        mode: election_day_partylist_table_text
        grayscale: true
        autocontrast: true
        line_removal:
          enabled: true
          horizontal: true
          vertical: true
          threshold: 175
          thickness: 1
          horizontal_min_run_ratio: 0.45
          vertical_min_run_ratio: 0.52
        sharpen: true
        sharpen_percent: 200
        upscale: 1.7
  profiles:
    default:
      languages:
        - th
      primary_engine: paddleocr
      fallback_engine: ""
      preprocess: raw
      line_filter: off
    zones:
      metadata:
        preprocess: thai_text
        line_filter: thai_numeric
        confidence_threshold: 0.50
        paddle:
          text_rec_score_thresh: 0.25
      summary:
        preprocess: thai_text
        line_filter: thai_numeric
        confidence_threshold: 0.50
        paddle:
          text_rec_score_thresh: 0.25
      table:
        preprocess: table_text
        line_filter: thai_numeric
        confidence_threshold: 0.45
        paddle:
          text_det_limit_side_len: 2240
          text_rec_score_thresh: 0.20
    forms:
      "5_16":
        document_label: ส.ส.5/16 เลือกล่วงหน้าในเขต - คะแนน ส.ส.เขต
        default:
          line_filter: thai_numeric
        zones:
          table:
            preprocess: advance_constituency_table_text
            line_filter: thai_numeric
            confidence_threshold: 0.45
            paddle:
              text_det_limit_side_len: 2240
              text_rec_score_thresh: 0.20
      "5_16_partylist":
        document_label: ส.ส.5/16 (บช) เลือกล่วงหน้าในเขต - คะแนนบัญชีรายชื่อ
        default:
          line_filter: thai_numeric
        zones:
          table:
            preprocess: advance_partylist_table_text
            line_filter: thai_numeric
            confidence_threshold: 0.40
            paddle:
              text_det_limit_side_len: 2560
              text_rec_score_thresh: 0.18
      "5_17":
        document_label: ส.ส.5/17 เลือกล่วงหน้านอกเขต - คะแนน ส.ส.เขต
        default:
          line_filter: thai_numeric
        zones:
          table:
            preprocess: advance_constituency_table_text
            line_filter: thai_numeric
            confidence_threshold: 0.45
            paddle:
              text_det_limit_side_len: 2240
              text_rec_score_thresh: 0.20
      "5_17_partylist":
        document_label: ส.ส.5/17 (บช) เลือกล่วงหน้านอกเขต - คะแนนบัญชีรายชื่อ
        default:
          line_filter: thai_numeric
        zones:
          table:
            preprocess: advance_partylist_table_text
            line_filter: thai_numeric
            confidence_threshold: 0.40
            paddle:
              text_det_limit_side_len: 2560
              text_rec_score_thresh: 0.18
      "5_18":
        document_label: ส.ส.5/18 วันเลือกตั้ง - คะแนน ส.ส.เขต
        default:
          line_filter: thai_numeric
        zones:
          table:
            preprocess: election_day_constituency_table_text
            line_filter: thai_numeric
            confidence_threshold: 0.45
            paddle:
              text_det_limit_side_len: 2240
              text_rec_score_thresh: 0.20
      "5_18_partylist":
        document_label: ส.ส.5/18 (บช) วันเลือกตั้ง - คะแนนบัญชีรายชื่อ
        default:
          line_filter: thai_numeric
        zones:
          table:
            preprocess: election_day_partylist_table_text
            line_filter: thai_numeric
            confidence_threshold: 0.40
            paddle:
              text_det_limit_side_len: 2560
              text_rec_score_thresh: 0.18
      "5_18_auto":
        document_label: Mixed ส.ส.5/18 bundle; full-page OCR resolves table zones to 5_18 or 5_18_partylist per page
        default:
          line_filter: thai_numeric
        zones:
          table:
            preprocess: table_text
            line_filter: thai_numeric
            confidence_threshold: 0.40

quality:
  target_accuracy: 0.99
  fuzzy_match_threshold: 0.86
  max_vote_cell_value: 999
  auto_digit_fallback_min_confidence: 0.75
  auto_digit_fallback_max_votes: 999

outputs:
  election_results: data/processed/election_results_long.csv
  polling_station_summary: data/processed/polling_station_summary.csv
  validation_report: data/processed/validation_report.csv
  ocr_progress: data/processed/ocr_progress.csv
  validation_report_md: outputs/reports/validation_report.md
  dashboard_dataset: data/processed/dashboard_dataset.parquet
  dashboard_dataset_csv: data/processed/dashboard_dataset.csv
  constituency_votes: data/processed/constituency_votes.csv
  partylist_votes: data/processed/partylist_votes.csv
  review_queue: data/processed/review_queue.csv
  accuracy_report: data/processed/accuracy_report.csv
  accuracy_details: data/processed/accuracy_details.csv
  accuracy_report_md: outputs/reports/accuracy_report.md
  error_analysis_report: data/processed/error_analysis_report.csv
  error_analysis_report_md: outputs/reports/error_analysis_report.md
  aggregate_validation_report: data/processed/aggregate_validation_report.csv
  aggregate_validation_report_md: outputs/reports/aggregate_validation_report.md
  master_match_report: data/processed/master_match_report.csv
  insights_report: outputs/reports/insights_report.md
  p0_fallback_targets: data/processed/p0_fallback_targets.csv
  p0_digit_crops_manifest: data/processed/p0_digit_crops_manifest.csv
  digit_crop_ocr_suggestions: data/processed/digit_crop_ocr_suggestions.csv
  auto_digit_vote_cells: data/processed/auto_digit_vote_cells.csv
  invalid_text_review: data/processed/invalid_text_charset_review.csv
  invalid_text_missing_vote_targets: data/processed/invalid_text_missing_vote_targets.csv
